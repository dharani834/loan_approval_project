<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #2c3e50;
        }

        input, select {
            width: 80%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 85%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
        }

        .section {
            text-align: left;
            margin-left: 10%;
            font-weight: bold;
            color: #34495e;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🏦 Loan Approval Prediction System</h1>

    <form action="/predict" method="POST">

        <!-- 1 -->
        <div class="section">Applicant Details</div>

        <input type="number" name="no_of_dependents" placeholder="No of Dependents" required>

        <select name="education">
            <option value="1">Graduate (1)</option>
            <option value="0">Not Graduate (0)</option>
        </select>

        <select name="self_employed">
            <option value="1">Self Employed (1)</option>
            <option value="0">Not Self Employed (0)</option>
        </select>


        <!-- 2 -->
        <div class="section">Income Details</div>

        <input type="number" name="income_annum" placeholder="Annual Income" required>

        <input type="number" name="loan_amount" placeholder="Loan Amount" required>

        <input type="number" name="loan_term" placeholder="Loan Term (Years)" required>

        <input type="number" name="cibil_score" placeholder="CIBIL Score" required>


        <!-- 3 -->
        <div class="section">Assets Details</div>

        <input type="number" name="residential_assets_value" placeholder="Residential Assets Value" required>

        <input type="number" name="commercial_assets_value" placeholder="Commercial Assets Value" required>

        <input type="number" name="luxury_assets_value" placeholder="Luxury Assets Value" required>

        <input type="number" name="bank_asset_value" placeholder="Bank Asset Value" required>


        <button type="submit">Predict Loan Status</button>

    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}

</div>

</body>
</html>
